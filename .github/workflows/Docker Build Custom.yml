name: "Docker Build Custom"

on:
  workflow_dispatch:
    inputs:
      nom:
        description: "Ton nom"
        required: true
        type: string

      version:
        description: "Version de l'image (ex: 1.0.0)"
        required: true
        type: string
        default: "1.0.0"

      image:
        description: "Nom de l'image Docker"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Afficher les informations saisies
        run: |
          echo "👤 Nom       : ${{ inputs.nom }}"
          echo "🏷️  Version   : ${{ inputs.version }}"
          echo "🐳 Image     : ${{ inputs.image }}"

      - name: Connexion à ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ inputs.image }}
          file: ./services/${{ inputs.image }}/Dockerfile
          push: true
          tags: |
            ghcr.io/donassongui/${{ inputs.image }}:${{ inputs.version }}
            ghcr.io/donassongui/${{ inputs.image }}:latest

      - name: Nettoyer le nom de l'image
        id: clean
        run: |
          # Remplace les espaces par des tirets et met en minuscules
          CLEAN_IMAGE=$(echo "${{ inputs.image }}" | tr ' ' '-' | tr '[:upper:]' '[:lower:]')
          echo "image=$CLEAN_IMAGE" >> $GITHUB_OUTPUT
      
      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ steps.clean.outputs.image }}
          file: ./services/${{ steps.clean.outputs.image }}/Dockerfile
          push: true
          tags: |
            ghcr.io/donassongui/${{ steps.clean.outputs.image }}:${{ inputs.version }}
            ghcr.io/donassongui/${{ steps.clean.outputs.image }}:latest

      - name: Créer la variable VERSION
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/variables \
            -d '{
              "name": "VERSION",
              "value": "${{ inputs.version }}"
            }'
      - name: Créer le secret avec le nom de l'image
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Installer la librairie nacl
          pip install PyNaCl --break-system-packages

          # Récupère la clé publique du dépôt
          PUBLIC_KEY=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/secrets/public-key)

          KEY_ID=$(echo $PUBLIC_KEY | jq -r '.key_id')
          KEY=$(echo $PUBLIC_KEY | jq -r '.key')

          # Chiffre la valeur du secret avec la clé publique
          ENCRYPTED=$(echo -n "ghcr.io/donassongui/${{ steps.clean.outputs.image }}:${{ inputs.version }}" | \
            python3 -c "
          import sys
          from base64 import b64encode
          from nacl import encoding, public

          key = public.PublicKey('$KEY'.encode(), encoding.Base64Encoder())
          box = public.SealedBox(key)
          value = sys.stdin.read().encode()
          encrypted = box.encrypt(value)
          print(b64encode(encrypted).decode())
          ")

          # Crée le secret avec le nom de l'image
          curl -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/secrets/${{ steps.clean.outputs.image }} \
            -d "{
              \"encrypted_value\": \"$ENCRYPTED\",
              \"key_id\": \"$KEY_ID\"
            }"
