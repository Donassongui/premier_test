name: interactif workflow

on:
  workflow_dispatch:
    inputs:
      nom_repo:
        description: 'Nom du repository'
        required: true
        type: string

      version:
        description: "Version du projet (ex: 1.0.0)"
        required: true
        type: string
        default: "1.0.0"

      image_docker:
        description: "Nom de l'image Docker"
        required: true
        type: string

permissions:
  contents: write

jobs:
  creer_repo:
    runs-on: ubuntu-latest
    steps:
      - name: Créer le repository
        env:
          GH_TOKEN: ${{ secrets.TOKEN_GITHUB }}
        run: |
          # Vérifier si le repo existe déjà
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.actor }}/${{ inputs.nom_repo }})

          if [ "$STATUS" = "200" ]; then
            echo "⚠️ Repository déjà existant, on continue !"
          else
            curl -L \
              -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2024-03-10" \
              https://api.github.com/user/repos \
              -d '{
                "name": "${{ inputs.nom_repo }}",
                "description": "Repository créé automatiquement par GitHub Actions",
                "private": false
              }'
            echo "✅ Repository ${{ inputs.nom_repo }} créé !"
          fi

  creer_variable:
    runs-on: ubuntu-latest
    needs: creer_repo
    steps:
      - name: Créer la variable VERSION
        env:
          GH_TOKEN: ${{ secrets.TOKEN_GITHUB }}
        run: |
          # Vérifier si la variable existe déjà
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.actor }}/${{ inputs.nom_repo }}/actions/variables/VERSION)

          if [ "$STATUS" = "200" ]; then
            curl -s -X PATCH \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.actor }}/${{ inputs.nom_repo }}/actions/variables/VERSION \
              -d '{
                "name": "VERSION",
                "value": "${{ inputs.version }}"
              }'
            echo "✅ Variable VERSION mise à jour : ${{ inputs.version }}"
          else
            curl -s -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.actor }}/${{ inputs.nom_repo }}/actions/variables \
              -d '{
                "name": "VERSION",
                "value": "${{ inputs.version }}"
              }'
            echo "✅ Variable VERSION créée : ${{ inputs.version }}"
          fi

  creer_secret:
    runs-on: ubuntu-latest
    needs: creer_variable
    steps:
      - name: Créer le secret IMAGE_DOCKER
        env:
          GH_TOKEN: ${{ secrets.TOKEN_GITHUB }}
        run: |
          # Installer PyNaCl
          pip install PyNaCl --break-system-packages

          # Récupérer la clé publique du repo créé
          PUBLIC_KEY=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.actor }}/${{ inputs.nom_repo }}/actions/secrets/public-key)

          KEY_ID=$(echo $PUBLIC_KEY | jq -r '.key_id')
          KEY=$(echo $PUBLIC_KEY | jq -r '.key')

          echo "🔑 Clé récupérée : $KEY_ID"

          # Chiffrer avec PyNaCl
          ENCRYPTED=$(python3 -c "
          from base64 import b64encode, b64decode
          from nacl import public

          key_bytes = b64decode('$KEY')
          key = public.PublicKey(key_bytes)
          box = public.SealedBox(key)
          value = '${{ inputs.image_docker }}'.encode()
          encrypted = box.encrypt(value)
          print(b64encode(encrypted).decode())
          ")

          echo "🔐 Valeur chiffrée avec succès"

          # Créer le secret
          curl -s -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.actor }}/${{ inputs.nom_repo }}/actions/secrets/IMAGE_DOCKER \
            -d "{
              \"encrypted_value\": \"$ENCRYPTED\",
              \"key_id\": \"$KEY_ID\"
            }"

          echo "✅ Secret IMAGE_DOCKER créé !"

  creer_readme:
    runs-on: ubuntu-latest
    needs: creer_secret
    steps:
      - name: Créer le README.md
        env:
          GH_TOKEN: ${{ secrets.TOKEN_GITHUB }}
        run: |
          contenu=$(printf "# ${{ inputs.nom_repo }}\nRepository créé automatiquement via GitHub Actions." | base64 -w 0)

          curl -s -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.actor }}/${{ inputs.nom_repo }}/contents/README.md \
            -d "{
              \"message\": \"Ajout du README.md\",
              \"content\": \"$contenu\"
            }"

          echo "✅ README.md créé !"

  resume:
    runs-on: ubuntu-latest
    needs: creer_readme
    steps:
      - name: Afficher le résumé
        run: |
          echo "======================================="
          echo "✅ Repository créé avec succès !"
          echo "📌 Nom     : ${{ inputs.nom_repo }}"
          echo "🏷️  Version : ${{ inputs.version }}"
          echo "🐳 Image   : ${{ inputs.image_docker }}"
          echo "🔗 URL     : https://github.com/${{ github.actor }}/${{ inputs.nom_repo }}"
          echo "======================================="
