name: "Docker Build"

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Quel service builder ?"
        required: true
        type: choice
        options:
          - api
          - worker
          - frontend
      tag:
        description: "Tag de l'image (ex: 1.0.0)"
        required: false
        default: "latest"
permissions:
  contents: read
  packages: write  

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd #v4.0.0

      - name: Connexion au registre GitHub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
              registry: ghcr.io
              username: ${{ github.actor }}
              password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build & Push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./services/${{ inputs.service }}
          file: ./services/${{ inputs.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/donassongui/${{ inputs.service }}:${{ inputs.tag }}
            ghcr.io/donassongui/${{ inputs.service }}:latest
        
      - id: normalise_image_name
        run: |
          cleaned=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          COMMIT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          echo "image_name=ghcr.io/$cleaned/odoo:$COMMIT_SHA" >> "$GITHUB_OUTPUT"


  
          
