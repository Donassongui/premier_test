name: "Docker Build"

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Quel service builder ?"
        required: true
        type: choice
        options:
          - api
          - worker
          - frontend
      tag:
        description: "Tag de l'image (ex: 1.0.0)"
        required: false
        default: "latest"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      - name: Connexion au registre GitHub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ inputs.service }}
          file: ./services/${{ inputs.service }}/Dockerfile
          push: true
          tags: |
            monuser/${{ inputs.service }}:${{ inputs.tag }}
            monuser/${{ inputs.service }}:latest
      - id: normalise_image_name
        run: |
          cleaned=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          COMMIT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          echo "image_name=ghcr.io/$cleaned/odoo:$COMMIT_SHA" >> "$GITHUB_OUTPUT"

      - name: Build and export to Registry
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          file: Dockerfile.preprod
          push: true
          tags: ${{ steps.normalise_image_name.outputs.image_name }}
  publish_images: 
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkoutv@4
      - name: build image
        run: docker build ./api/ -t donassongui/donassongui028:latest
      - name: push image to docker hub
        run: |
          docker login -u donassongui -p ${{secrets.DOCKER_HUB_TOKEN}}
          docker push donassongui/donassongui028:latest
          
