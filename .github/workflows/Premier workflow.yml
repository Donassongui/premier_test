name: Premier workflow

on:
  workflow_dispatch:
    inputs:
      nom_repo:
        description: 'Nom du repository'
        required: true
        type: string
      version:
        description: "Version du projet (ex: 1.0.0)"
        required: true
        type: string
        default: "1.0.0"
      image_docker:
        description: "Nom de l'image Docker"
        required: true
        type: string

permissions:
  contents: write

jobs:
  creer_repo:
    runs-on: ubuntu-latest
    steps:
      - name: creer le repository
        run: |
          NOM_REPO="${{ inputs.nom_repo }}"
          GH_TOKEN="${{ secrets.TOKEN_GITHUB }}"
          ACTOR="${{ github.actor }}"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/$ACTOR/$NOM_REPO)

          echo "Status : $STATUS"

          if [ "$STATUS" = "200" ]; then
            echo " Repository déjà existant, on continue !"
          else
            curl -L \
              -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              https://api.github.com/user/repos \
              -d "{
                \"name\": \"$NOM_REPO\",
                \"description\": \"Repository créé automatiquement par GitHub Actions\",
                \"private\": false
              }"
            echo " Repository $NOM_REPO créé !"
          fi

  creer_variable:
    runs-on: ubuntu-latest
    needs: creer_repo
    steps:
      - name: Créer la variable VERSION
        run: |
          NOM_REPO="${{ inputs.nom_repo }}"
          GH_TOKEN="${{ secrets.TOKEN_GITHUB }}"
          ACTOR="${{ github.actor }}"
          VERSION="${{ inputs.version }}"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/$ACTOR/$NOM_REPO/actions/variables/VERSION)


  creer_secret:
    runs-on: ubuntu-latest
    needs: creer_variable
    steps:
      - name: Créer le secret IMAGE_DOCKER
        run: |
          NOM_REPO="${{ inputs.nom_repo }}"
          GH_TOKEN="${{ secrets.TOKEN_GITHUB }}"
          ACTOR="${{ github.actor }}"
          IMAGE="${{ inputs.image_docker }}"

          pip install PyNaCl --break-system-packages

          echo " Attente initialisation du repo..."
          sleep 5

          echo " Valeur chiffrée avec succès"

          curl -s -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/$ACTOR/$NOM_REPO/actions/secrets/IMAGE_DOCKER \

          echo " Secret IMAGE_DOCKER créé !"

  creer_readme:
    runs-on: ubuntu-latest
    needs: creer_secret
    steps:
      - name: Créer le README.md
        run: |
          NOM_REPO="${{ inputs.nom_repo }}"
          GH_TOKEN="${{ secrets.TOKEN_GITHUB }}"
          ACTOR="${{ github.actor }}"

          contenu=$(printf "# $NOM_REPO\nRepository créé automatiquement via GitHub Actions." | base64 -w 0)

          curl -s -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/$ACTOR/$NOM_REPO/contents/README.md \
            -d "{
              \"message\":" Bienvenu dans mon README " \"Ajout du README.md\",
              \"content\": \"$contenu\"
            }"

          echo " README.md créé !"

  resume:
    runs-on: ubuntu-latest
    needs: creer_readme
    steps:
      - name: Afficher le résumé
        run: |
          echo "======================================="
          echo " Repository créé avec succès !"
          echo " Nom     : ${{ inputs.nom_repo }}"
          echo "  Version : ${{ inputs.version }}"
          echo " Image   : ${{ inputs.image_docker }}"
          echo " URL     : https://github.com/${{ github.actor }}/${{ inputs.nom_repo }}"
          echo "======================================="
